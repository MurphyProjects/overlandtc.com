<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Overland Trading Co. — Coming Soon</title>
  <meta name="description" content="Overland Trading Co. is an urban explorer apparel brand. Coming soon. Sign up to be the first to know." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;800&family=Barlow:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:            #213035;
      --bg-dark:       #161f24;
      --silver:        #a0afb4;
      --silver-bright: #b7c4ca;
      --white:         #dce6ea;
      --muted:         #788689;
      --border:        rgba(160,175,180,0.2);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg);
      color: var(--white);
      font-family: 'Barlow', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 2rem 5rem;
      position: relative;
      overflow-x: hidden;
    }

    /* Grain */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 10;
    }

    /* Vignette */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(15,20,24,0.65) 100%);
      pointer-events: none;
      z-index: 1;
    }

    .container {
      position: relative;
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      width: 100%;
      max-width: 700px;
      gap: 0;
    }

    /* ── LOGO ── */
    .logo-img {
      height: 250px;
      width: auto;
      display: block;
      animation: fadeUp 1s 0.1s ease both;
    }

    /* ── TAGLINE — sits right below logo, no gap ── */
    .tagline {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.82rem;
      font-weight: 400;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--silver);
      margin-top: 0.4rem;
      animation: fadeUp 1s 0.25s ease both;
    }

    /* ── DIVIDER ── */
    .divider {
      width: 60px;
      height: 1px;
      background: var(--border);
      margin: 2rem auto;
      animation: fadeUp 1s 0.4s ease both;
    }

    /* ── HEADLINE ── */
    .coming-soon {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(3.5rem, 10vw, 6rem);
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--white);
      line-height: 1;
      animation: fadeUp 1s 0.5s ease both;
    }

    .coming-soon span { color: var(--silver); }

    /* ── SUB ── */
    .sub {
      font-size: 1rem;
      color: var(--muted);
      line-height: 1.8;
      margin-top: 1.5rem;
      max-width: 420px;
      animation: fadeUp 1s 0.65s ease both;
    }

    /* ── EMAIL FORM ── */
    .form-wrap {
      display: flex;
      margin-top: 2.5rem;
      width: 100%;
      max-width: 420px;
      animation: fadeUp 1s 0.8s ease both;
    }

    .form-wrap input {
      flex: 1;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-right: none;
      color: var(--white);
      font-family: 'Barlow', sans-serif;
      font-size: 0.9rem;
      font-weight: 300;
      padding: 0.9rem 1.25rem;
      outline: none;
      transition: background 0.2s, border-color 0.2s;
    }

    .form-wrap input::placeholder { color: var(--muted); }
    .form-wrap input:focus {
      background: rgba(255,255,255,0.1);
      border-color: var(--silver);
    }

    .form-wrap button {
      background: var(--silver);
      color: var(--bg-dark);
      border: none;
      padding: 0.9rem 1.5rem;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .form-wrap button:hover { background: var(--silver-bright); }

    .confirm-msg {
      display: none;
      margin-top: 1rem;
      font-size: 0.82rem;
      letter-spacing: 0.1em;
      color: var(--silver);
      text-transform: uppercase;
    }

    /* ── FOOTER ── */
    .footer {
      margin-top: 3rem;
      text-align: center;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      animation: fadeUp 1s 1s ease both;
    }

    .footer a {
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer a:hover { color: var(--silver); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      .logo-img { height: 160px; }
      .form-wrap { flex-direction: column; }
      .form-wrap input { border-right: 1px solid var(--border); border-bottom: none; }
    }
  </style>
</head>
